<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Dashboard — Login</title>
    <meta name="description" content="Secure login to your WhatsApp Cloud API Webhook Dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a1628;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a1628 0%, #0d2137 40%, #0a2a1e 100%);
            z-index: 0;
        }

        /* Floating blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }
        .blob-1 { width: 400px; height: 400px; background: #00a884; top: -100px; left: -100px; animation-delay: 0s; }
        .blob-2 { width: 300px; height: 300px; background: #005c4b; bottom: -80px; right: -80px; animation-delay: 3s; }
        .blob-3 { width: 200px; height: 200px; background: #128c7e; top: 50%; left: 60%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Floating chat bubbles in background */
        .bubble-bg {
            position: fixed;
            border-radius: 12px;
            opacity: 0.04;
            animation: riseBubble linear infinite;
            z-index: 0;
        }
        @keyframes riseBubble {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.04; }
            90% { opacity: 0.04; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Login card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            margin: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 44px 40px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            text-align: center;
            animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo area */
        .logo-area {
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #00a884, #005c4b);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 32px rgba(0,168,132,0.35);
            animation: pulseLogo 3s ease-in-out infinite;
        }
        @keyframes pulseLogo {
            0%, 100% { box-shadow: 0 8px 32px rgba(0,168,132,0.35); }
            50% { box-shadow: 0 8px 48px rgba(0,168,132,0.6); }
        }
        .logo-icon svg { width: 38px; height: 38px; fill: white; }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #e9edef;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 13px;
            color: #8696a0;
            font-weight: 400;
        }

        /* Divider */
        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, #00a884, #005c4b);
            border-radius: 2px;
            margin: 20px auto;
        }

        /* Error message */
        .error-msg {
            background: rgba(255, 107, 107, 0.12);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff8a8a;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* Form */
        .form-group {
            position: relative;
            margin-bottom: 16px;
        }
        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #8696a0;
            text-align: left;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            color: #8696a0;
            pointer-events: none;
            display: flex;
        }
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 13px 44px 13px 42px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #e9edef;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: #00a884;
            background: rgba(0,168,132,0.08);
            box-shadow: 0 0 0 3px rgba(0,168,132,0.15);
        }
        input::placeholder { color: #4a5568; }

        .eye-toggle {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: #8696a0;
            display: flex;
            align-items: center;
            padding: 4px;
            transition: color 0.2s;
        }
        .eye-toggle:hover { color: #00a884; }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00a884, #008069);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            box-shadow: 0 4px 20px rgba(0,168,132,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(0,168,132,0.45);
        }
        .btn-login:active {
            transform: translateY(0);
            opacity: 0.9;
        }

        /* Footer */
        .login-footer {
            margin-top: 28px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .footer-dot {
            width: 4px;
            height: 4px;
            background: #00a884;
            border-radius: 50%;
            opacity: 0.6;
        }
    </style>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0a1628">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registered:', reg.scope);
                }).catch(err => {
                    console.log('SW registration failed:', err);
                });
            });
        }
    </script>
</head>
<body>

<div class="bg-gradient"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Decorative rising bubbles -->
<div class="bubble-bg" style="width:120px;height:60px;background:#00a884;left:10%;animation-duration:14s;animation-delay:0s;"></div>
<div class="bubble-bg" style="width:80px;height:40px;background:#005c4b;left:30%;animation-duration:18s;animation-delay:4s;"></div>
<div class="bubble-bg" style="width:100px;height:50px;background:#00a884;right:15%;animation-duration:16s;animation-delay:2s;"></div>
<div class="bubble-bg" style="width:60px;height:30px;background:#128c7e;right:35%;animation-duration:20s;animation-delay:7s;"></div>

<div class="login-card">
    <!-- Logo -->
    <div class="logo-area">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        </div>
        <h1>Webhook Dashboard</h1>
        <p class="subtitle">WhatsApp Cloud API Manager</p>
    </div>

    <div class="divider"></div>

    {% if error %}
        <div class="error-msg">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="/login">
        <div class="form-group">
            <label class="input-label" for="password">Passcode</label>
            <div class="input-wrapper">
                <span class="input-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autofocus>
                <button type="button" class="eye-toggle" id="eyeToggle" onclick="togglePassword()" aria-label="Toggle password visibility">
                    <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            Unlock Dashboard
        </button>
    </form>

    <div class="login-footer">
        <span>Secured</span>
        <div class="footer-dot"></div>
        <span>WhatsApp Cloud API</span>
        <div class="footer-dot"></div>
        <span>v1.0</span>
    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
    }
</script>

</body>
</html>
