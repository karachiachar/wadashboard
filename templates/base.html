<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}WhatsApp Dashboard{% endblock %}</title>
    <meta name="description" content="WhatsApp Cloud API Webhook Chat Dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-darkest:    #0a1628;
            --bg-sidebar:    #111b21;
            --bg-chat:       #0d1b2a;
            --bg-header:     #182533;
            --bg-input:      #1f2c34;
            --bg-item-hover: #1f2c34;
            --bg-item-active:#2a3942;
            --surface:       rgba(255,255,255,0.04);
            --border:        rgba(255,255,255,0.08);
            --green:         #00a884;
            --green-deep:    #005c4b;
            --green-glow:    rgba(0,168,132,0.18);
            --bubble-in:     #202c33;
            --bubble-out:    #005c4b;
            --text-1:        #e9edef;
            --text-2:        #8696a0;
            --text-3:        #3d5060;
            --danger:        #ff6b6b;
            --t:             0.2s ease;
        }
        html,body { margin:0;padding:0;font-family:'Inter',sans-serif;background:var(--bg-darkest);height:100%;overflow:hidden;color:var(--text-1); display:flex; flex-direction:column; }

        /* ── TOP NAV BAR ── */
        .top-navbar {
            height: 60px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-1);
            font-weight: 600;
            font-size: 16px;
        }
        .nav-logo-box {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--green), var(--green-deep));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px var(--green-glow);
        }
        .nav-logo-box svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link {
            text-decoration: none;
            color: var(--text-2);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all var(--t);
        }
        .nav-link:hover {
            color: var(--text-1);
            background: var(--surface);
        }
        .nav-link.active {
            color: var(--green);
            background: rgba(0, 168, 132, 0.1);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: none;
            border: none;
            color: var(--text-2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--t);
            text-decoration: none;
        }
        .nav-icon-btn:hover {
            background: var(--surface);
            color: var(--text-1);
        }

        /* Responsive */
        @media (max-width: 767px) {
            .nav-link { padding: 8px 10px; font-size: 13px; }
            .nav-brand span { display: none; }
        }
        
        .page-content {
            flex: 1;
            min-height: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
    </style>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0a1628">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registered:', reg.scope);
                }).catch(err => {
                    console.log('SW registration failed:', err);
                });
            });
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="top-navbar">
        <a href="/" class="nav-brand">
            <div class="nav-logo-box">
                <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            </div>
            <span>WhatsApp Dashboard</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/messenger" class="nav-link {% if active_page == 'messenger' %}active{% endif %}">Messenger</a>
            <a href="/data" class="nav-link {% if active_page == 'data' %}active{% endif %}">Data</a>
            <a href="/settings" class="nav-link {% if active_page == 'settings' %}active{% endif %}">Setting</a>
        </div>
        <div class="nav-actions">
            <a href="/logout" class="nav-icon-btn" title="Logout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </nav>
    <div class="page-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
